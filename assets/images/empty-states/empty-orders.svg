<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="orderGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E0E0E0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#BDBDBD;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="100" cy="100" r="90" fill="#F5F5F5"/>
  
  <!-- Clipboard base -->
  <rect x="70" y="60" width="60" height="80" rx="5" fill="url(#orderGrad)" stroke="#9E9E9E" stroke-width="2"/>
  
  <!-- Clipboard clip -->
  <rect x="85" y="50" width="30" height="15" rx="3" fill="#757575" stroke="#616161" stroke-width="2"/>
  <circle cx="100" cy="57" r="4" fill="#BDBDBD"/>
  
  <!-- Paper lines -->
  <line x1="80" y1="75" x2="120" y2="75" stroke="#FFF" stroke-width="2" stroke-linecap="round"/>
  <line x1="80" y1="85" x2="120" y2="85" stroke="#FFF" stroke-width="2" stroke-linecap="round"/>
  <line x1="80" y1="95" x2="110" y2="95" stroke="#FFF" stroke-width="2" stroke-linecap="round"/>
  <line x1="80" y1="105" x2="115" y2="105" stroke="#FFF" stroke-width="2" stroke-linecap="round"/>
  
  <!-- Empty state - no orders indicator -->
  <circle cx="100" cy="115" r="15" fill="#FFC107" opacity="0.3"/>
  <text x="100" y="120" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#FFC107" text-anchor="middle">!</text>
  
  <!-- Clock icon (waiting) -->
  <circle cx="100" cy="40" r="12" fill="none" stroke="#BDBDBD" stroke-width="2"/>
  <line x1="100" y1="40" x2="100" y2="34" stroke="#BDBDBD" stroke-width="2" stroke-linecap="round"/>
  <line x1="100" y1="40" x2="106" y2="40" stroke="#BDBDBD" stroke-width="2" stroke-linecap="round"/>
  
  <!-- Floating order tickets (faded) -->
  <rect x="45" y="80" width="20" height="25" rx="2" fill="#4ECDC4" opacity="0.2"/>
  <rect x="135" y="70" width="18" height="22" rx="2" fill="#45B7D1" opacity="0.2"/>
  <rect x="145" y="100" width="15" height="20" rx="2" fill="#FF6B6B" opacity="0.2"/>
  
  <!-- Sad face -->
  <circle cx="100" cy="150" r="2" fill="#BDBDBD"/>
  <circle cx="108" cy="150" r="2" fill="#BDBDBD"/>
  <path d="M 97 156 Q 100 153 103 156" fill="none" stroke="#BDBDBD" stroke-width="1.5" stroke-linecap="round"/>
</svg>
