<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="chefGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF9A56;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF6B6B;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="hatGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E0E0E0;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="100" cy="100" r="90" fill="#F5F5F5"/>
  
  <!-- Chef body -->
  <ellipse cx="100" cy="140" rx="35" ry="25" fill="url(#chefGrad)"/>
  
  <!-- Chef hat -->
  <path d="M 75 90 L 75 70 Q 75 55 90 55 L 110 55 Q 125 55 125 70 L 125 90 Z" fill="url(#hatGrad)" stroke="#BDBDBD" stroke-width="1"/>
  <ellipse cx="100" cy="70" rx="30" ry="12" fill="#FFF" stroke="#BDBDBD" stroke-width="1"/>
  <ellipse cx="100" cy="82" rx="25" ry="8" fill="#FFF" stroke="#E0E0E0" stroke-width="1"/>
  
  <!-- Hat pleats -->
  <path d="M 80 70 Q 85 60 90 70" fill="none" stroke="#E0E0E0" stroke-width="1" opacity="0.5"/>
  <path d="M 90 70 Q 95 60 100 70" fill="none" stroke="#E0E0E0" stroke-width="1" opacity="0.5"/>
  <path d="M 100 70 Q 105 60 110 70" fill="none" stroke="#E0E0E0" stroke-width="1" opacity="0.5"/>
  <path d="M 110 70 Q 115 60 120 70" fill="none" stroke="#E0E0E0" stroke-width="1" opacity="0.5"/>
  
  <!-- Chef face -->
  <circle cx="100" cy="95" r="18" fill="#FFCC80"/>
  
  <!-- Happy eyes -->
  <path d="M 93 92 Q 95 89 97 92" fill="none" stroke="#5D4037" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M 103 92 Q 105 89 107 92" fill="none" stroke="#5D4037" stroke-width="1.5" stroke-linecap="round"/>
  
  <!-- Smile -->
  <path d="M 95 100 Q 100 104 105 100" fill="none" stroke="#5D4037" stroke-width="1.5" stroke-linecap="round"/>
  
  <!-- Blush -->
  <ellipse cx="90" cy="97" rx="3" ry="2" fill="#FFAB91" opacity="0.6"/>
  <ellipse cx="110" cy="97" rx="3" ry="2" fill="#FFAB91" opacity="0.6"/>
  
  <!-- Cooking utensils -->
  <!-- Pan left -->
  <ellipse cx="55" cy="110" rx="15" ry="8" fill="#757575" stroke="#616161" stroke-width="1"/>
  <rect x="40" y="108" width="20" height="4" fill="#757575"/>
  <line x1="45" y1="110" x2="55" y2="110" stroke="#9E9E9E" stroke-width="1"/>
  <line x1="50" y1="108" x2="55" y2="112" stroke="#9E9E9E" stroke-width="1" opacity="0.5"/>
  
  <!-- Spoon right -->
  <ellipse cx="145" cy="105" rx="8" ry="10" fill="#BDBDBD" stroke="#9E9E9E" stroke-width="1"/>
  <rect x="148" y="115" width="4" height="20" fill="#BDBDBD"/>
  
  <!-- Steam from cooking -->
  <path d="M 50 100 Q 52 95 50 90" stroke="#BDBDBD" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.6"/>
  <path d="M 55 98 Q 57 93 55 88" stroke="#BDBDBD" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.6"/>
  <path d="M 60 100 Q 62 95 60 90" stroke="#BDBDBD" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.6"/>
  
  <!-- Ready indicator (checkmark) -->
  <circle cx="100" cy="155" r="12" fill="#28A745" opacity="0.2"/>
  <path d="M 95 155 L 98 158 L 105 150" fill="none" stroke="#28A745" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Floating ingredients -->
  <circle cx="40" cy="70" r="5" fill="#FF6B6B" opacity="0.4"/>
  <circle cx="160" cy="80" r="4" fill="#4ECDC4" opacity="0.4"/>
  <circle cx="155" cy="130" r="6" fill="#FFE66D" opacity="0.4"/>
</svg>
