<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="searchGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#BDBDBD;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#9E9E9E;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="100" cy="100" r="90" fill="#F5F5F5"/>
  
  <!-- Magnifying glass -->
  <circle cx="90" cy="90" r="40" fill="none" stroke="url(#searchGrad)" stroke-width="5"/>
  
  <!-- Handle -->
  <rect x="115" y="115" width="50" height="12" rx="6" fill="url(#searchGrad)" transform="rotate(45 115 115)"/>
  
  <!-- No results indicator - X inside lens -->
  <line x1="75" y1="75" x2="105" y2="105" stroke="#FF6B6B" stroke-width="3" stroke-linecap="round"/>
  <line x1="105" y1="75" x2="75" y2="105" stroke="#FF6B6B" stroke-width="3" stroke-linecap="round"/>
  
  <!-- Question mark above -->
  <path d="M 90 55 Q 90 45 100 45 Q 108 45 108 52 Q 108 58 100 62 Q 95 65 95 70" fill="none" stroke="#BDBDBD" stroke-width="3" stroke-linecap="round"/>
  <circle cx="100" cy="78" r="2" fill="#BDBDBD"/>
  
  <!-- Floating documents (faded) -->
  <rect x="40" y="60" width="20" height="25" rx="2" fill="#4ECDC4" opacity="0.25"/>
  <rect x="140" y="70" width="18" height="22" rx="2" fill="#45B7D1" opacity="0.25"/>
  <rect x="150" y="120" width="15" height="20" rx="2" fill="#FF6B6B" opacity="0.25"/>
  
  <!-- Sad face below -->
  <circle cx="85" cy="145" r="2.5" fill="#BDBDBD"/>
  <circle cx="115" cy="145" r="2.5" fill="#BDBDBD"/>
  <path d="M 90 152 Q 100 148 110 152" fill="none" stroke="#BDBDBD" stroke-width="2" stroke-linecap="round"/>
  
  <!-- Search sparkles (faded) -->
  <circle cx="55" cy="80" r="3" fill="#FFD700" opacity="0.4"/>
  <circle cx="145" cy="95" r="2" fill="#FFD700" opacity="0.4"/>
  <circle cx="60" cy="120" r="2.5" fill="#FFD700" opacity="0.4"/>
  <circle cx="135" cy="130" r="3" fill="#FFD700" opacity="0.4"/>
  
  <!-- Hint text lines (faded) -->
  <line x1="50" y1="160" x2="80" y2="160" stroke="#BDBDBD" stroke-width="2" stroke-linecap="round" opacity="0.3"/>
  <line x1="120" y1="160" x2="150" y2="160" stroke="#BDBDBD" stroke-width="2" stroke-linecap="round" opacity="0.3"/>
</svg>
