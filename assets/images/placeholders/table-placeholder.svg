<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="tableGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4A90D9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#357ABD;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Table top -->
  <rect x="20" y="35" width="60" height="40" rx="5" fill="url(#tableGrad)" stroke="#2E5C8A" stroke-width="2"/>
  
  <!-- Table legs -->
  <rect x="25" y="75" width="8" height="15" fill="#3A6B9E"/>
  <rect x="67" y="75" width="8" height="15" fill="#3A6B9E"/>
  
  <!-- Table number plate -->
  <rect x="35" y="42" width="30" height="16" rx="3" fill="#FFF" stroke="#DDD" stroke-width="1"/>
  <text x="50" y="54" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#333" text-anchor="middle">#</text>
  
  <!-- Chair left -->
  <rect x="8" y="45" width="10" height="20" rx="3" fill="#8B7355" opacity="0.8"/>
  <rect x="10" y="65" width="6" height="10" fill="#6B5344"/>
  
  <!-- Chair right -->
  <rect x="82" y="45" width="10" height="20" rx="3" fill="#8B7355" opacity="0.8"/>
  <rect x="84" y="65" width="6" height="10" fill="#6B5344"/>
  
  <!-- Chair bottom -->
  <rect x="40" y="80" width="20" height="15" rx="3" fill="#8B7355" opacity="0.8"/>
  <rect x="45" y="95" width="10" height="5" fill="#6B5344"/>
  
  <!-- Decorative elements -->
  <circle cx="50" cy="45" r="3" fill="#FFD700" opacity="0.6"/>
  <circle cx="42" cy="58" r="2" fill="#FFD700" opacity="0.4"/>
  <circle cx="58" cy="58" r="2" fill="#FFD700" opacity="0.4"/>
  
  <!-- Shadow -->
  <ellipse cx="50" cy="95" rx="30" ry="5" fill="#000" opacity="0.1"/>
</svg>
